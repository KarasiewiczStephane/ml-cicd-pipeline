name: Model Training

on:
  workflow_dispatch:
    inputs:
      force_retrain:
        description: "Force retraining even if cache is valid"
        required: false
        type: boolean
        default: false
  schedule:
    - cron: "0 0 * * 0"
  push:
    paths:
      - "data/**"
      - "src/models/**"

jobs:
  train:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate data
        run: python -m src.data.validator

      - name: Train model
        run: python -m src.models.train

      - name: Evaluate model
        run: python -m src.models.evaluate

      - name: Performance gate
        run: python -m src.models.registry

      - name: Generate release notes
        run: python -m src.utils.release_notes

      - name: Upload model artifact
        uses: actions/upload-artifact@v4
        with:
          name: trained-model
          path: models/model.joblib

      - name: Upload metrics report
        uses: actions/upload-artifact@v4
        with:
          name: metrics-report
          path: metrics/

      - name: Create GitHub Release
        if: success()
        uses: softprops/action-gh-release@v2
        with:
          tag_name: model-v${{ github.run_number }}
          name: Model Release v${{ github.run_number }}
          body_path: metrics/release_notes.md
          files: |
            models/model.joblib
            metrics/latest_metrics.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
