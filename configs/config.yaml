# ML CI/CD Pipeline Configuration
environment: dev

data:
  dataset: iris
  test_size: 0.2
  random_state: 42

model:
  algorithm: random_forest
  n_estimators: 100
  random_state: 42
  path: models/model.joblib

performance:
  accuracy_threshold: 0.85

server:
  host: "0.0.0.0"
  port: 8000
  debug: true

logging:
  level: DEBUG
  format: "%(asctime)s - %(name)s - %(levelname)s - %(message)s"

paths:
  models_dir: models
  metrics_dir: metrics
  data_dir: data/sample
  reports_dir: reports
